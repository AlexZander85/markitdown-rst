name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.edition }} for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Full edition (GUI + OCR + Preview) ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            edition: full
            features: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            edition: full
            features: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            edition: full
            features: ""
          # ── Light edition (GUI, no OCR, no Preview) ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            edition: light
            features: "--no-default-features --features gui"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            edition: light
            features: "--no-default-features --features gui"
          - os: macos-latest
            target: x86_64-apple-darwin
            edition: light
            features: "--no-default-features --features gui"
          # ── CLI-only edition (no GUI, with OCR) ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            edition: cli-only
            features: "--no-default-features --features cli-only"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            edition: cli-only
            features: "--no-default-features --features cli-only"
          - os: macos-latest
            target: x86_64-apple-darwin
            edition: cli-only
            features: "--no-default-features --features cli-only"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libx11-dev libx11-xcb-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxdamage-dev libxfixes-dev libxinerama-dev libwayland-dev \
            libgbm-dev libegl-dev libclang-dev libspeechd-dev \
            libtesseract-dev libleptonica-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install tesseract leptonica

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.edition }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-${{ matrix.edition }}-cargo-

      # ── Build ──
      - name: Build GUI binary (Full / Light)
        if: matrix.edition != 'cli-only'
        run: cargo build --release --bin markitdown-rst --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build CLI binary (CLI-only)
        if: matrix.edition == 'cli-only'
        run: cargo build --release --bin markitdown-cli --target ${{ matrix.target }} ${{ matrix.features }}

      # ── Prepare artifacts ──
      # GUI:  markitdown-rst-{edition}-{os}-x64[.exe]
      # CLI:  markitdown-cli-{os}-x64[.exe]  (no edition suffix — one CLI per OS)
      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $edition = "${{ matrix.edition }}"
          $target = "${{ matrix.target }}"

          if ($edition -ne "cli-only") {
            $src = "target/$target/release/markitdown-rst.exe"
            $dst = "markitdown-rst-${edition}-windows-x64.exe"
            Copy-Item $src $dst
            Write-Host "GUI artifact: $dst ($('{0:N0}' -f (Get-Item $dst).Length) bytes)"
          }

          if ($edition -eq "cli-only") {
            $src = "target/$target/release/markitdown-cli.exe"
            $dst = "markitdown-cli-windows-x64.exe"
            Copy-Item $src $dst
            Write-Host "CLI artifact: $dst ($('{0:N0}' -f (Get-Item $dst).Length) bytes)"
          }

      - name: Prepare artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          EDITION="${{ matrix.edition }}"
          TARGET="${{ matrix.target }}"

          if [ "$EDITION" != "cli-only" ]; then
            cp "target/$TARGET/release/markitdown-rst" "markitdown-rst-${EDITION}-linux-x64"
            chmod +x "markitdown-rst-${EDITION}-linux-x64"
            echo "GUI artifact: markitdown-rst-${EDITION}-linux-x64 ($(stat -c%s markitdown-rst-${EDITION}-linux-x64) bytes)"
          fi

          if [ "$EDITION" = "cli-only" ]; then
            cp "target/$TARGET/release/markitdown-cli" "markitdown-cli-linux-x64"
            chmod +x "markitdown-cli-linux-x64"
            echo "CLI artifact: markitdown-cli-linux-x64 ($(stat -c%s markitdown-cli-linux-x64) bytes)"
          fi

      - name: Prepare artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          EDITION="${{ matrix.edition }}"
          TARGET="${{ matrix.target }}"

          if [ "$EDITION" != "cli-only" ]; then
            cp "target/$TARGET/release/markitdown-rst" "markitdown-rst-${EDITION}-macos-x64"
            chmod +x "markitdown-rst-${EDITION}-macos-x64"
            echo "GUI artifact: markitdown-rst-${EDITION}-macos-x64 ($(stat -f%z markitdown-rst-${EDITION}-macos-x64) bytes)"
          fi

          if [ "$EDITION" = "cli-only" ]; then
            cp "target/$TARGET/release/markitdown-cli" "markitdown-cli-macos-x64"
            chmod +x "markitdown-cli-macos-x64"
            echo "CLI artifact: markitdown-cli-macos-x64 ($(stat -f%z markitdown-cli-macos-x64) bytes)"
          fi

      # ── Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-${{ matrix.edition }}-${{ matrix.target }}
          path: |
            markitdown-rst-*
            markitdown-cli-*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: Create release archives
        run: |
          mkdir -p release-assets
          cd artifacts

          # Create .tar.gz for Linux binaries
          for f in markitdown-rst-*-linux-x64 markitdown-cli-linux-x64; do
            if [ -f "$f" ]; then
              tar czf "../release-assets/${f}.tar.gz" "$f"
              echo "Packaged: ${f}.tar.gz"
            fi
          done

          # Copy Windows .exe as-is
          for f in markitdown-rst-*-windows-x64.exe markitdown-cli-windows-x64.exe; do
            if [ -f "$f" ]; then
              cp "$f" "../release-assets/$f"
              echo "Copied: $f"
            fi
          done

          # Create .tar.gz for macOS binaries
          for f in markitdown-rst-*-macos-x64 markitdown-cli-macos-x64; do
            if [ -f "$f" ]; then
              tar czf "../release-assets/${f}.tar.gz" "$f"
              echo "Packaged: ${f}.tar.gz"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
